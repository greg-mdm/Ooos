
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <meta name="description" content="Ooo Digital Media Studio. Decision-support and participatory design. Home of Ostara, the Canadian Innovation Dimension, and the Canadian Interactive Exhibition." />
      <link rel="icon" type="image/png" href="/assets/images/brand/compass.png" />
      <title>Ooos · Ooo Digital Media Studio</title>
      <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>
      <script>
        // GitHub Pages SPA shim: if 404.html redirected with ?p=/route,
        // restore the path before React Router boots.
        (function () {
          var p = new URLSearchParams(location.search).get('p');
          if (p) {
            var q = new URLSearchParams(location.search).get('q');
            history.replaceState(null, '', p + (q ? '?' + decodeURIComponent(q) : '') + location.hash);
          }
        })();
      </script>
    </head>

    <body>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
