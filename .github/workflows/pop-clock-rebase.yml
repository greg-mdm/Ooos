name: Rebase pop clock calibration

# Refreshes public/pop-clock/calibration.json -- the snapshot the Ooo! Pop Clock
# Mini re-bases to so it stays within a minimal margin of StatCan's official
# clock. See scripts/rebase-pop-clock.mjs.
#
# NO SCRAPING BY DESIGN. There is no scheduled auto-fetch: StatCan's clock ticks
# client-side and ooos.ca promotes StatCan's own licensed data rather than
# scraping. So this workflow is a manual "button" -- you (a human) read the
# current figure off the public clock and enter it here. The widget's own default
# rate already comes from the official WDS REST API; this button just pins it to a
# precise live reading when you have one.
#
#   Actions tab -> "Rebase pop clock calibration" -> "Run workflow" -> enter the
#   official population (and optionally "change since midnight" to pin the rate).
#
# The script's sanity alarm refuses to write (and fails the run) if a new reading
# implies more than 1,750 persons/day of NET change versus the last snapshot --
# override via the repo variable POP_CLOCK_MAX_DAILY_CHANGE.

on:
  workflow_dispatch:
    inputs:
      population:
        description: "Official population, e.g. 41554157 (read off StatCan's clock)"
        required: true
      changeSinceMidnight:
        description: 'Optional: official "change since midnight" to derive the rate'
        required: false

permissions:
  contents: write
  actions: write

concurrency:
  group: pop-clock-rebase
  cancel-in-progress: false

jobs:
  rebase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Refresh calibration snapshot
        env:
          MAX_DAILY_CHANGE: ${{ vars.POP_CLOCK_MAX_DAILY_CHANGE }}
        run: |
          node scripts/rebase-pop-clock.mjs "${{ github.event.inputs.population }}" ${{ github.event.inputs.changeSinceMidnight }}

      - name: Commit if changed
        run: |
          if git diff --quiet -- public/pop-clock/calibration.json; then
            echo "No change to calibration.json -- nothing to deploy."
            exit 0
          fi
          git config user.name "ooos-bot"
          git config user.email "bot@ooos.ca"
          git add public/pop-clock/calibration.json
          git commit -m "Rebase pop clock calibration snapshot"
          git push origin HEAD:main
          echo "deploy=1" >> "$GITHUB_ENV"

      - name: Trigger Pages deploy
        if: env.deploy == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref main
