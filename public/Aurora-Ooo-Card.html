  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Aurora Field — Display Card<\u002Ftitle>\n<style>\n  :root{\n    --midnight:#0F031C;\n    --darkest:#06021C;\n    --silver:#E8ECF4;\n    --silver-dim:rgba(232,236,244,0.45);\n    --hairline:rgba(232,236,244,0.16);\n  }\n  *{ box-sizing:border-box; margin:0; padding:0; }\n  html,body{ height:100%; }\n  body{\n    background:\n      radial-gradient(120% 90% at 50% 18%, #11041f 0%, #06021C 55%, #03010e 100%);\n    color:var(--silver);\n    font-family:'SF Pro Display','Helvetica Neue',Helvetica,Arial,sans-serif;\n    -webkit-font-smoothing:antialiased;\n    display:flex; align-items:center; justify-content:center;\n    min-height:100%; overflow:hidden;\n  }\n\n  /* ---- display window / pedestal ---- */\n  .stage{\n    position:relative;\n    display:flex; flex-direction:column; align-items:center;\n    perspective:1400px;\n    padding:20px;\n  }\n  .spotlight{\n    position:absolute; left:50%; top:38%; transform:translate(-50%,-50%);\n    width:min(86vw,1000px); height:min(70vh,720px);\n    background:radial-gradient(closest-side, rgba(91,4,222,0.16), rgba(75,0,182,0.06) 45%, transparent 72%);\n    filter:blur(8px); pointer-events:none;\n  }\n\n  /* ---- the card: custom frame PNG over a live aurora window ---- */\n  .card{\n    position:relative;\n    width:min(74vw, 700px);\n    max-height:80vh;\n    aspect-ratio:783 / 556;\n    container-type:inline-size;\n    transform-style:preserve-3d;\n    transition:transform .25s cubic-bezier(.2,.7,.2,1);\n    will-change:transform;\n    filter:drop-shadow(0 40px 70px rgba(0,0,0,0.72)) drop-shadow(0 12px 30px rgba(75,0,182,0.30));\n  }\n\n  /* window opening wrapper carries the insets; canvas fills it 100% */\n  .window{\n    position:absolute;\n    top:2.5%; bottom:2.5%; left:2.6%; right:1.3%;\n    overflow:hidden;\n    background:var(--darkest);\n    transform:translateZ(0);\n  }\n  #gl{\n    position:absolute; inset:0;\n    width:100%; height:100%; display:block;\n  }\n  /* faint glass vignette inside the window */\n  .glass{\n    position:absolute; inset:0;\n    pointer-events:none; z-index:2;\n    background:\n      radial-gradient(120% 100% at 50% -8%, rgba(232,236,244,0.08), transparent 42%),\n      radial-gradient(140% 120% at 50% 118%, rgba(0,0,0,0.45), transparent 56%);\n  }\n  /* the user's custom Canva frame, sitting above the tank */\n  .frame{\n    position:absolute; inset:0; width:100%; height:100%;\n    display:block; z-index:3; pointer-events:none; user-select:none;\n    transform:translateZ(26px);\n  }\n  /* label locked into the bottom-right shelf of the frame */\n  .shelf-label{\n    position:absolute; z-index:4;\n    left:79.4%; right:2.7%; top:90.2%; bottom:2.2%;\n    display:flex; flex-direction:column;\n    align-items:center; justify-content:center;\n    gap:1px;\n    text-align:center; line-height:1.05;\n    font-weight:600; letter-spacing:.22em; text-transform:uppercase;\n    color:#E8ECF4;\n    font-size:clamp(6px, 1.35cqw, 12px);\n    text-shadow:0 1px 3px rgba(0,0,0,0.6);\n    pointer-events:none; user-select:none;\n    transform:translateZ(27px);\n  }\n\n  /* placard under the case */\n  .placard{\n    margin-top:30px; text-align:center; white-space:nowrap;\n    font-size:10px; letter-spacing:.30em; text-transform:uppercase;\n    color:var(--silver-dim); transform:translateZ(0);\n  }\n  .placard b{ color:var(--silver); font-weight:600; }\n\n  @media (max-width:560px){\n    .card{ width:92vw; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  <div class=\"stage\">\n    <div class=\"spotlight\"><\u002Fdiv>\n\n    <div class=\"card\" id=\"card\">\n      <div class=\"window\">\n        <canvas id=\"gl\"><\u002Fcanvas>\n        <div class=\"glass\"><\u002Fdiv>\n      <\u002Fdiv>\n      <img class=\"frame\" src=\"c3e29e5c-7a20-4583-8967-15b72173de51\" alt=\"Aurora Field display card frame\">\n      <div class=\"shelf-label\"><span>Aurora<\u002Fspan><span>Field<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"placard\"><b>move to part the smoke · click to bloom<\u002Fb><\u002Fdiv>\n  <\u002Fdiv>\n\n  \n\n  <script>\n  /* ===== Tuned Aurora Field — de-blued (drops dark-indigo, leans violet/teal/ember) ===== */\n  const FRAG = `\n  precision highp float;\n  uniform vec2  u_res;\n  uniform float u_time;\n  uniform vec2  u_mouse;\n  uniform vec2  u_mvel;\n  uniform float u_mdown;\n  uniform vec3  u_clicks[8];\n\n  const vec3 DARKEST  = vec3(0.024,0.008,0.110);\n  const vec3 PORTAL   = vec3(0.294,0.000,0.714);\n  const vec3 ELECTRIC = vec3(0.357,0.016,0.871);\n  const vec3 TEAL     = vec3(0.000,0.502,0.502);\n  const vec3 ROBIN    = vec3(0.941,0.957,0.961);\n  const vec3 EMBER    = vec3(0.62,0.18,0.42);   // warm magenta-violet (kills the blue cast)\n\n  mat2 rot(float a){ float c=cos(a), s=sin(a); return mat2(c,-s,s,c); }\n  float hash21(vec2 p){ p=fract(p*vec2(123.34,345.45)); p+=dot(p,p+34.345); return fract(p.x*p.y); }\n  float noise(vec2 p){\n    vec2 i=floor(p), f=fract(p); vec2 u=f*f*(3.0-2.0*f);\n    float a=hash21(i),b=hash21(i+vec2(1,0)),c=hash21(i+vec2(0,1)),d=hash21(i+vec2(1,1));\n    return mix(mix(a,b,u.x),mix(c,d,u.x),u.y);\n  }\n  float fbm(vec2 p){ float v=0.0,a=0.5; for(int i=0;i<6;i++){ v+=a*noise(p); p=rot(0.5)*p*2.0+11.3; a*=0.5; } return v; }\n  float ripples(vec2 uv,float speed,float width,float decay){\n    float sum=0.0;\n    for(int i=0;i<8;i++){ vec3 c=u_clicks[i]; if(c.z<0.0) continue;\n      float age=u_time-c.z; if(age<0.0||age>6.0) continue;\n      float d=distance(uv,c.xy); float ring=sin((d-age*speed)*40.0*width);\n      float band=smoothstep(width,0.0,abs(d-age*speed));\n      sum+=ring*band*exp(-age*decay);\n    } return sum;\n  }\n\n  void main(){\n    vec2 uv = gl_FragCoord.xy/u_res;\n    float asp = u_res.x/u_res.y;\n    vec2 p = uv; p.x*=asp;\n    vec2 m = u_mouse; m.x*=asp;\n    float t = u_time*0.08;\n\n    vec3 col = DARKEST;\n    vec2 toM = p-m; float md=length(toM);\n    float push = exp(-md*md*2.6);\n\n    float acc=0.0;\n    for(int i=0;i<3;i++){\n      float fi=float(i);\n      float depth=1.0+fi*0.6;\n      vec2 q=(p-vec2(0.5*asp,0.5))/depth+vec2(0.5*asp,0.5);\n      q+=(m-vec2(0.5*asp,0.5))*(0.05*fi);\n      q*=1.7; q.y-=t*(0.6+fi*0.25);\n      q+=normalize(toM+1e-4)*push*0.30*(1.0+length(u_mvel)*3.0);\n      vec2 w=vec2(fbm(q+vec2(0.0,t)),fbm(q+vec2(3.1,-t)));\n      float dens=fbm(q+3.0*w);\n      dens=smoothstep(0.32,0.96,dens);\n      float layerA=dens*(0.6/depth);\n      // de-blued ramp: portal -> electric, with ember warmth (no dark-indigo)\n      vec3 lc=mix(PORTAL, ELECTRIC, smoothstep(0.35,1.0,dens));\n      lc=mix(lc, EMBER, smoothstep(0.2,0.75,w.x)*0.45);\n      col=mix(col, lc, layerA);\n      acc+=layerA;\n    }\n\n    // warm + teal drifting blooms\n    float g1=exp(-distance(p, vec2(0.70*asp,0.34)+0.10*vec2(sin(t*2.0),cos(t*1.7)))*3.0);\n    col += EMBER*g1*0.60*acc;\n    float g2=exp(-distance(p, vec2(0.28*asp,0.72)+0.10*vec2(cos(t*1.3),sin(t*1.9)))*3.4);\n    col += TEAL*g2*0.42*acc;\n\n    col += (ELECTRIC*0.5+ROBIN*0.32)*push*0.55;           // cursor bloom\n    float r=ripples(p,0.5,0.16,1.0);\n    col += (ROBIN*0.55+ELECTRIC*0.45)*max(r,0.0)*0.9;      // click bloom\n\n    col += (hash21(gl_FragCoord.xy+u_time)-0.5)*0.014;\n    float vig=smoothstep(1.45,0.2, length(uv-0.5));\n    col *= 0.5+0.5*vig;\n    gl_FragColor=vec4(col,1.0);\n  }`;\n\n  const VERT = `attribute vec2 a_pos; void main(){ gl_Position=vec4(a_pos,0.0,1.0); }`;\n\n  function init(attempt){\n    const canvas = document.getElementById('gl');\n    const card = document.getElementById('card');\n    const gl = canvas.getContext('webgl', {antialias:false, premultipliedAlpha:false, preserveDrawingBuffer:true})\n            || canvas.getContext('experimental-webgl', {antialias:false, premultipliedAlpha:false, preserveDrawingBuffer:true});\n    if(!gl){\n      // transient null context on first paint — retry a few frames before giving up\n      if((attempt||0) < 30){ requestAnimationFrame(()=>init((attempt||0)+1)); return; }\n      console.warn('WebGL unavailable for Aurora Field card'); return;\n    }\n    const dpr = Math.min(window.devicePixelRatio||1, 1.6);\n    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n\n    function compile(src,type){ const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s);\n      if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s)); return s; }\n    const prog=gl.createProgram();\n    gl.attachShader(prog, compile(VERT,gl.VERTEX_SHADER));\n    gl.attachShader(prog, compile(FRAG,gl.FRAGMENT_SHADER));\n    gl.linkProgram(prog); gl.useProgram(prog);\n\n    const buf=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,buf);\n    gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);\n    const la=gl.getAttribLocation(prog,'a_pos'); gl.enableVertexAttribArray(la);\n    gl.vertexAttribPointer(la,2,gl.FLOAT,false,0,0);\n    const U=n=>gl.getUniformLocation(prog,n);\n    const u_res=U('u_res'),u_time=U('u_time'),u_mouse=U('u_mouse'),u_mvel=U('u_mvel'),u_mdown=U('u_mdown'),u_clicks=U('u_clicks');\n\n    const start=performance.now();\n    let mouse=[0.5,0.55], target=[0.5,0.55], mvel=[0,0], mdown=0, mdownT=0;\n    const clicks=new Float32Array(24).fill(-1); let head=0;\n\n    function resize(){\n      const w=Math.max(1,Math.floor(canvas.clientWidth*dpr));\n      const h=Math.max(1,Math.floor(canvas.clientHeight*dpr));\n      if(canvas.width!==w||canvas.height!==h){ canvas.width=w; canvas.height=h; }\n    }\n    function render(){\n      resize();\n      const ox=mouse[0],oy=mouse[1];\n      mouse[0]+=(target[0]-mouse[0])*0.12; mouse[1]+=(target[1]-mouse[1])*0.12;\n      mvel[0]=mvel[0]*0.85+(mouse[0]-ox)*0.15; mvel[1]=mvel[1]*0.85+(mouse[1]-oy)*0.15;\n      mdown+=(mdownT-mdown)*0.1;\n      const t=(performance.now()-start)/1000;\n      gl.viewport(0,0,gl.drawingBufferWidth,gl.drawingBufferHeight);\n      gl.uniform2f(u_res,gl.drawingBufferWidth,gl.drawingBufferHeight);\n      gl.uniform1f(u_time,t);\n      gl.uniform2f(u_mouse,mouse[0],mouse[1]);\n      gl.uniform2f(u_mvel,mvel[0],mvel[1]);\n      gl.uniform1f(u_mdown,mdown);\n      gl.uniform3fv(u_clicks,clicks);\n      gl.drawArrays(gl.TRIANGLES,0,3);\n    }\n\n    // ---- pointer: shader cursor + subtle 3D tilt of the card (the \"tank\") ----\n    function pointer(e){\n      const cr=canvas.getBoundingClientRect();\n      target=[ (e.clientX-cr.left)/cr.width, 1.0-(e.clientY-cr.top)/cr.height ];\n      const dr=card.getBoundingClientRect();\n      const rx=(e.clientX-dr.left)/dr.width - 0.5;\n      const ry=(e.clientY-dr.top)/dr.height - 0.5;\n      card.style.transform=`rotateX(${(-ry*9).toFixed(2)}deg) rotateY(${(rx*11).toFixed(2)}deg)`;\n      render();\n    }\n    card.addEventListener('pointermove', pointer);\n    card.addEventListener('pointerleave', ()=>{ card.style.transform='rotateX(0deg) rotateY(0deg)'; });\n    card.addEventListener('pointerdown', (e)=>{\n      const cr=canvas.getBoundingClientRect();\n      const i=head*3; clicks[i]=(e.clientX-cr.left)/cr.width; clicks[i+1]=1.0-(e.clientY-cr.top)/cr.height;\n      clicks[i+2]=(performance.now()-start)/1000; head=(head+1)%8; mdownT=1; render();\n    });\n    window.addEventListener('pointerup', ()=> mdownT=0);\n    card.addEventListener('touchmove',(e)=>{ if(e.touches[0]) pointer(e.touches[0]); },{passive:true});\n\n    // ---- loop (pause when offscreen; static frame for reduced-motion) ----\n    let raf=null, visible=true;\n    function loop(){ raf=requestAnimationFrame(loop); if(visible) render(); }\n    if(reduce){ resize(); render(); }\n    else {\n      new IntersectionObserver((es)=>{ visible=es[0].isIntersecting; },{threshold:0.05}).observe(canvas);\n      loop();\n    }\n    window.addEventListener('resize', ()=>{ resize(); render(); });\n    render();\n  }\n\n  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',()=>init(0));\n  else init(0);\n  <\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
